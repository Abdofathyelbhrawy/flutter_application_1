name: radiology_attendance
description: "تطبيق حضور وانصراف - مركز الأشعة"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  provider: ^6.1.2
  uuid: ^4.5.1
  flutter_local_notifications: ^18.0.1
  supabase_flutter: ^2.8.4
  geolocator: ^13.0.0
  flutter_launcher_icons: ^0.13.1
  pdf: ^3.11.1
  printing: ^5.13.1
  fl_chart: ^1.1.1
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/Cairo-Regular.ttf
    - assets/fonts/Cairo-Bold.ttf
    - assets/image/icon (2).png

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/image/icon (2).png"
